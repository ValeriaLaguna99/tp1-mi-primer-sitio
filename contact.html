<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Sitio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contacto</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <form id="contact-form" action="#">
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Tu nombre">
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                </div>

                <div class="form-group">
                    <label for="tel">Teléfono:</label>
                    <input type="tel" id="tel" name="tel" pattern="[0-9]{8,15}" placeholder="Solo números">
                </div>

                <div class="form-group">
                    <label for="motivo">Motivo de contacto:</label>
                    <select id="motivo" name="motivo">
                        <option value="consulta">Consulta</option>
                        <option value="presupuesto">Presupuesto</option>
                        <option value="reclamo">Reclamo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" required minlength="10" rows="5"></textarea>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="terminos" required> Acepto los términos y condiciones
                    </label>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </section>
  </main>
   <footer>
        <p>&copy; 2026 Valeria Roxana Laguna: Hecho con HTML5 y CSS3.</p>
    </footer>
</body>

</html>
